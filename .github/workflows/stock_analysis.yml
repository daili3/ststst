name: A股信号分析推送

# 触发条件：3 种方式
# 1. repository_dispatch：由 cron-job.org 准时触发（推荐，准时可靠）
# 2. schedule：GitHub 原生定时（备份，可能延迟/跳过）
# 3. workflow_dispatch：手动触发
on:
  repository_dispatch:
    types: [pre_open, open_5min, mid_morning, noon_open, tail]
  schedule:
    - cron: '3 1 * * 1-5'    # 北京 09:03 → 盘前简报（备份，可能延迟）
    - cron: '37 1 * * 1-5'   # 北京 09:37 → 开盘 5 分钟速报
    - cron: '32 2 * * 1-5'   # 北京 10:32 → 盘中信号
    - cron: '7 5 * * 1-5'    # 北京 13:07 → 午盘速报
    - cron: '57 6 * * 1-5'   # 北京 14:57 → 尾盘决策
  workflow_dispatch:
    inputs:
      slot:
        description: '选择执行时段（手动测试用）'
        required: true
        default: 'pre_open'
        type: choice
        options:
          - pre_open
          - open_5min
          - mid_morning
          - noon_open
          - tail
          - test

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 确定时段
        id: slot
        run: |
          # 优先级 1：手动触发
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
            echo "来源: 手动触发"
          # 优先级 2：cron-job.org 通过 repository_dispatch 触发
          elif [ -n "${{ github.event.action }}" ]; then
            echo "slot=${{ github.event.action }}" >> $GITHUB_OUTPUT
            echo "来源: cron-job.org 外部触发"
          # 优先级 3：GitHub 原生 schedule（备份）
          else
            case "${{ github.event.schedule }}" in
              "3 1 * * 1-5")    echo "slot=pre_open" >> $GITHUB_OUTPUT ;;
              "37 1 * * 1-5")   echo "slot=open_5min" >> $GITHUB_OUTPUT ;;
              "32 2 * * 1-5")   echo "slot=mid_morning" >> $GITHUB_OUTPUT ;;
              "7 5 * * 1-5")    echo "slot=noon_open" >> $GITHUB_OUTPUT ;;
              "57 6 * * 1-5")   echo "slot=tail" >> $GITHUB_OUTPUT ;;
              *)                echo "slot=pre_open" >> $GITHUB_OUTPUT ;;
            esac
            echo "来源: GitHub 定时备份 (${{ github.event.schedule }})"
          fi

      - name: 执行分析
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Shanghai
        run: python main.py ${{ steps.slot.outputs.slot }}
